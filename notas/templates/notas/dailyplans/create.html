{% extends "notas/base.html" %}
{% block title %}Create DailyPlan{% endblock %}
{% block content %}


<div class="page page--detail page-modal">

  <div class="wrap-page-modal">

    <form method="post">
      {% csrf_token %}
      <div class="main-modal">
        <i data-lucide="clipboard-list" class="main-modal-icon dailyplan"></i>
        <h2 class="title-create">Crea un nuevo Plan Diario</h2>

        <label class="name-create">Elige un Nombre</label>
        <input type="text" name="name" placeholder="Puede ser un día de la semana, un objetivo para ese día..." class="input-create">
    
      </div>
      
      <div class="btn-block">
        <button  type="submit" class="btn-continue">Continuar</button>
      </div>
    </form>
    
  </div>

  <!-- FIN ============================================== -->

</div>

{% endblock %}
