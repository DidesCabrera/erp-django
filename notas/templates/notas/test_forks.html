<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fork tester</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f7f7f7;
        }
        h1 {
            margin-bottom: 30px;
        }
        .box {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            max-width: 500px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
        }
        button {
            padding: 10px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Fork test (internal)</h1>

<!-- Fork Meal -->
<div class="box">
    <h2>Fork Meal</h2>
    <form method="post"
          onsubmit="this.action='/meals/' + this.meal_id.value + '/fork/';">
        {% csrf_token %}
        <label>Meal</label>
        <select name="meal_id" required>
            {% for meal in meals %}
                <option value="{{ meal.id }}">
                    {{ meal.id }} – {{ meal.name }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Fork Meal</button>
    </form>
</div>

<!-- Fork Meal -->
<div class="box">
    <h2>Copy Meal</h2>
    <form method="post"
          onsubmit="this.action='/meals/' + this.meal_id.value + '/copy/';">
        {% csrf_token %}
        <label>Meal</label>
        <select name="meal_id" required>
            {% for meal in meals %}
                <option value="{{ meal.id }}">
                    {{ meal.id }} – {{ meal.name }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Copy Meal</button>
    </form>
</div>

<!-- Fork DailyPlan -->
<div class="box">
    <h2>Fork DailyPlan</h2>
    <form method="post"
          onsubmit="this.action='/dailyplans/' + this.dailyplan_id.value + '/fork/';">
        {% csrf_token %}
        <label>DailyPlan</label>
        <select name="dailyplan_id" required>
            {% for dp in dailyplans %}
                <option value="{{ dp.id }}">
                    {{ dp.id }} – {{ dp.name }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Fork DailyPlan</button>
    </form>
</div>

<div class="box">
    <h2>Copy DailyPlan</h2>
    <form method="post"
          onsubmit="this.action='/dailyplans/' + this.dailyplan_id.value + '/copy/';">
        {% csrf_token %}
        <label>DailyPlan</label>
        <select name="dailyplan_id" required>
            {% for dp in dailyplans %}
                <option value="{{ dp.id }}">
                    {{ dp.id }} – {{ dp.name }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Copy DailyPlan</button>
    </form>
</div>


<!-- Fork Program -->
<div class="box">
    <h2>Fork Program</h2>
    <form method="post"
          onsubmit="this.action='/programs/' + this.program_id.value + '/fork/';">
        {% csrf_token %}
        <label>Program</label>
        <select name="program_id" required>
            {% for program in programs %}
                <option value="{{ program.id }}">
                    {{ program.id }} – {{ program.name }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Fork Program</button>
    </form>
</div>

<div class="box">
    <h2>Copy Program</h2>
    <form method="post"
          onsubmit="this.action='/programs/' + this.program_id.value + '/copy/';">
        {% csrf_token %}
        <label>Program</label>
        <select name="program_id" required>
            {% for program in programs %}
                <option value="{{ program.id }}">
                    {{ program.id }} – {{ program.name }}
                </option>
            {% endfor %}
        </select>
        <button type="submit">Copy Program</button>
    </form>
</div>

</body>
</html>
