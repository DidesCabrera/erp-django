{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body class="auth-body">

    <div class="auth-card">
    <img class="auth-logo" src="/static/img/logo_negro.png">
    
    <h1 class="auth-title">Iniciar sesión</h1>
    
    {% load socialaccount %}

    <a class="btn-google"
    href="{% provider_login_url 'google' %}">
    Continuar con Google
    </a>
    
    <div class="divider">
    <span>o</span>
    </div>
    
    <form method="post" class="auth-form">
    {% csrf_token %}
    
        <input
        type="email"
        name="login"
        placeholder="Email"
        required>
        
        <input
        type="password"
        name="password"
        placeholder="Password"
        required>
        
        <button type="submit">
        Continuar
        </button>
        
    </form>
    
    <p class="auth-links">
    
    <a href="{% url 'account_reset_password' %}">
    Olvidé mi contraseña
    </a>
    
    </p>
    
    <p class="auth-links">
    
    ¿No tienes cuenta?
    <a href="{% url 'account_signup' %}">
    Crear cuenta
    </a>
    
    </p>
    
    </div>
    
    </body>
</html>
