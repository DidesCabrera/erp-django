<h2>Edit meal in daily plan</h2>

<form method="post">
  {% csrf_token %}

  <p>
    <label>Hour</label>
    <input type="time" name="hour" value="{{ dpm.hour }}">
  </p>

  <p>
    <label>Note</label>
    <input type="text" name="note" value="{{ dpm.note }}">
  </p>

  <button type="submit">Save</button>
</form>
