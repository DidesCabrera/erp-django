{% extends "notas/base.html" %}
{% block content %}

<h2>Add "{{ meal.name }}" to "{{ dailyplan.name }}"</h2>

<form method="post">
  {% csrf_token %}

  <!-- Hour -->
  <label>Hour</label>
  <input type="time" name="hour">

  <!-- Note -->
  <label>Note</label>
  <input type="text" name="note">

  <button type="submit">
    Add meal
  </button>
</form>

{% endblock %}
