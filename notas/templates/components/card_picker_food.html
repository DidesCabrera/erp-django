<div data-scope="food-preview">

    <!-- TITLE -->
    <h2>
  
      <i data-lucide="carrot" class="add-row-icon"></i>
  
      <span
        id="preview-name"
        data-role="preview-name"
      ></span>
  
      <span class="food-base">100g</span>
  
    </h2>
  
  
    <!-- KPI -->
    <div class="dash-kpi-comp picker">
  
      <!-- TOTAL KCAL -->
      <div class="tot">
  
        <h2>
          <span
            id="base-kcal"
            data-role="food-kcal"
          ></span>
        </h2>
  
        <p>Total kcal</p>
  
      </div>
  
  
      <div class="macros">
  
  
        <!-- PROTEIN -->
        <div class="kpi-row picker">
  
          <div class="kpi-label">Protein</div>
  
          <div class="kpi-grams">
            <span
              id="base-protein"
              data-role="food-protein"
            ></span> g
          </div>
  
  
          <div class="kpi-alloc">
  
            <div class="alloc-pct alloc-bar-fill--protein">
  
              <p
                id="base-alloc-protein-text"
                data-role="alloc-protein-text"
              ></p>
  
            </div>
  
  
            <div
              class="alloc-bar-comp"
              id="base-alloc-protein-cell"
              data-role="alloc-protein"
              style="--alloc:0"
            >
  
              <div class="alloc-bar-bg picker"></div>
  
              <div class="alloc-bar-fill alloc-bar-fill--protein"></div>
  
            </div>
  
          </div>
  
        </div>
  
  
        <!-- CARBS -->
        <div class="kpi-row picker">
  
          <div class="kpi-label">Carbs</div>
  
          <div class="kpi-grams">
            <span
              id="base-carbs"
              data-role="food-carbs"
            ></span> g
          </div>
  
  
          <div class="kpi-alloc">
  
            <div class="alloc-pct alloc-bar-fill--carbs">
  
              <p
                id="base-alloc-carbs-text"
                data-role="alloc-carbs-text"
              ></p>
  
            </div>
  
  
            <div
              class="alloc-bar-comp"
              id="base-alloc-carbs-cell"
              data-role="alloc-carbs"
              style="--alloc:0"
            >
  
              <div class="alloc-bar-bg picker"></div>
  
              <div class="alloc-bar-fill alloc-bar-fill--carbs"></div>
  
            </div>
  
          </div>
  
        </div>
  
  
        <!-- FAT -->
        <div class="kpi-row picker">
  
          <div class="kpi-label">Fat</div>
  
          <div class="kpi-grams">
            <span
              id="base-fat"
              data-role="food-fat"
            ></span> g
          </div>
  
  
          <div class="kpi-alloc">
  
            <div class="alloc-pct alloc-bar-fill--fat">
  
              <p
                id="base-alloc-fat-text"
                data-role="alloc-fat-text"
              ></p>
  
            </div>
  
  
            <div
              class="alloc-bar-comp"
              id="base-alloc-fat-cell"
              data-role="alloc-fat"
              style="--alloc:0"
            >
  
              <div class="alloc-bar-bg picker"></div>
  
              <div class="alloc-bar-fill alloc-bar-fill--fat"></div>
  
            </div>
  
          </div>
  
        </div>
  
  
      </div>
  
    </div>
  
  </div>
