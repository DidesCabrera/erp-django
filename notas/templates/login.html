<!DOCTYPE html>
<html>
<head>
    <title>Crear Nota</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            width: 300px;
        }
        input, textarea {
            margin-bottom: 10px;
            padding: 8px;
        }
        button {
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>Iniciar sesión</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>
    <p>¿No tienes cuenta? <a href="{% url 'signup' %}">Regístrate aquí</a></p>

</body>
</html>
