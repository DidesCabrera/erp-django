<div class="data-grid data-grid--mobile-foods-qty">

    <div class="data-grid-header data-grid-header--mobile-foods-qty">
        <div class="data-grid-col data-grid-col--name">Alimentos</div>
        <div class="data-grid-col data-grid-col--qty">Qty</div>
    </div>

    {% for row in items %}
        <div class="data-grid-row data-grid-row--mobile-foods-qty">
            <div class="data-grid-cell data-grid-cell--name">
                {{ row.rel.name }}
            </div>

            <div class="data-grid-cell data-grid-cell--qty">
                {{ row.rel.quantity|floatformat:0 }}
            </div>
        </div>
    {% empty %}
        <div class="data-grid-empty">
            No foods added yet.
        </div>
    {% endfor %}

</div>
