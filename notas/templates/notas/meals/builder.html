{% extends "notas/base.html" %}
{% block title %}
Build Meal – {{ meal.name }}
{% endblock %}
{% block content %}


<!-- ======== PAGE BODY ===================================== --> 
<div class="page page--detail" data-page="meal-builder">

  <!-- MAIN-CARD ======================================-->
  {% include "components/card_main_meal_edit.html" with main_card=ui.main_card %}


  <hr>
  <!-- ACTION NAVEGATION ======================================-->
  <div class="btn-block">
        <!-- 👈 Volver al paso 1 (seguro) -->
        <a href="{% url 'meal_rename' ui.main_card.main_id %}" data-safe-exit="true">
          <button  type="submit" class="btn-cancel-create">Volver</button>
        </a>
          
        <!-- 👉 Continuar al paso 3 (seguro) -->
        <a href="{{ continue_url }}" data-safe-exit="true">
          <button type="submit"  class="btn-continue">Continuar</button>
        </a>

  </div>



  <!-- UNSAVED CHANGES MODAL -->
  <div id="unsaved-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <p>Tienes cambios sin guardar. ¿Deseas salir igualmente?</p>

      <div class="modal-actions">
        <button id="stay-here">Seguir editando</button>
        <button id="leave-anyway">Salir sin guardar</button>
      </div>
    </div>
  </div>

  {% load static %}
  <!-- 🔒 UNSAVED CHANGES GUARD -->
  <script>
    // En el builder asumimos siempre trabajo en progreso
    let isDirty = true;

    // Protege cerrar pestaña / recargar
    window.addEventListener("beforeunload", function (e) {
      if (!isDirty) return;
      e.preventDefault();
      e.returnValue = "";
    });

    // Modal
    const modal = document.getElementById("unsaved-modal");
    const stayBtn = document.getElementById("stay-here");
    const leaveBtn = document.getElementById("leave-anyway");

    // Captura cualquier link
    document.addEventListener("click", (e) => {
      const link = e.target.closest("a");
      if (!link || !isDirty) return;

      // enlaces seguros (como Continue)
      if (link.dataset.safeExit === "true") {
        isDirty = false;
        window.onbeforeunload = null;
        return;
      }

      // detener navegación y mostrar modal
      e.preventDefault();
      modal.style.display = "block";

      leaveBtn.onclick = () => {
        isDirty = false;
        window.onbeforeunload = null;
        window.location.href = link.href;
      };

      stayBtn.onclick = () => {
        modal.style.display = "none";
      };
    });

    // Enviar el form (agregar food) es flujo válido
    const previewForm = document.getElementById("form-preview");
    if (previewForm) {
      previewForm.addEventListener("submit", () => {
        isDirty = false;
        window.onbeforeunload = null;
      });
    }
  </script>

</div>

{% endblock %}
