<div class="picker-preview-kpi">

    <div class="picker-preview-kpi__tot">
      <div class="picker-preview-kpi__tot-label">
        Calories
      </div>
      <div class="picker-preview-kpi__tot-result">
        <span id="dailyplan-prev-kcal"></span>
      </div>
      <div class="picker-preview-kpi__tot-value impact-positive">
        +<span id="dailyplan-impact-kcal"></span>
      </div>
    </div>
  
    <div class="picker-preview-kpi__macros">
  
      <div class="picker-preview-kpi__row">
        <div class="picker-preview-kpi__label grams-col">
          P
        </div>
  
        <div class="picker-preview-kpi__value">
          <span class="picker-preview-inline-impact impact-positive">
            +<span id="dailyplan-impact-protein"></span>
          </span>
          <span class="picker-preview-inline-result">
            <span id="dailyplan-prev-protein"></span>g
          </span>
        </div>
  
        <div class="picker-preview-kpi__ppk">
            <span class="ppk-inline" data-role="dailyplan-prev-ppk"></span>
        </div>
  
        <div
          class="picker-preview-kpi__alloc alloc-cell"
          id="dailyplan-prev-alloc-protein-cell"
        >
          <div class="alloc-bar alloc-bar--protein"></div>
          <span
            class="alloc-text"
            id="dailyplan-prev-alloc-protein-text"
          ></span>
        </div>
      </div>
  
      <div class="picker-preview-kpi__row">
        <div class="picker-preview-kpi__label grams-col">
          C
        </div>
  
        <div class="picker-preview-kpi__value">
          <span class="picker-preview-inline-impact impact-positive">
            +<span id="dailyplan-impact-carbs"></span>
          </span>
          <span class="picker-preview-inline-result">
            <span id="dailyplan-prev-carbs"></span>g
          </span>
        </div>
  
        <div class="picker-preview-kpi__ppk"></div>
  
        <div
          class="picker-preview-kpi__alloc alloc-cell"
          id="dailyplan-prev-alloc-carbs-cell"
        >
          <div class="alloc-bar alloc-bar--carbs"></div>
          <span
            class="alloc-text"
            id="dailyplan-prev-alloc-carbs-text"
          ></span>
        </div>
      </div>
  
      <div class="picker-preview-kpi__row">
        <div class="picker-preview-kpi__label grams-col">
          F
        </div>
  
        <div class="picker-preview-kpi__value">
          <span class="picker-preview-inline-impact impact-positive">
            +<span id="dailyplan-impact-fat"></span>
          </span>
          <span class="picker-preview-inline-result">
            <span id="dailyplan-prev-fat"></span>g
          </span>
        </div>
  
        <div class="picker-preview-kpi__ppk"></div>
  
        <div
          class="picker-preview-kpi__alloc alloc-cell"
          id="dailyplan-prev-alloc-fat-cell"
        >
          <div class="alloc-bar alloc-bar--fat"></div>
          <span
            class="alloc-text"
            id="dailyplan-prev-alloc-fat-text"
          ></span>
        </div>
      </div>
  
    </div>
  
  </div>
