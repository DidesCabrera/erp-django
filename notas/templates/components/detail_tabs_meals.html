<div class="card-detail-tabs card-detail-tabs--desktop block-desplegar-tabla block-card-desplegar">

    {% if show_hide_tab %}
    <div
        class="btn-desplegar btn-desplegar--hide is-active"
        data-panel-action="hide"
        aria-label="Ocultar panel"
    >
        <i data-lucide="chevron-right" class="tab-icon tab-icon-hide"></i>
    </div>
    {% endif %}

    <div class="btn-desplegar {% if not show_hide_tab %}is-active{% endif %}" data-target="#card-menu-{{ panel_id }}">
        <p>Menú</p>
    </div>

    <div class="btn-desplegar" data-target="#card-grid-meals-{{ panel_id }}">
        <p>Tabla Nutricional</p>
    </div>

    {% if show_desktop_edit_tab %}
    <div class="btn-desplegar" data-target="#card-grid-meals-edit-{{ panel_id }}">
        <p>Editar</p>
    </div>
    {% endif %}

</div>

<div class="card-detail-tabs-mobile">

    {% if show_hide_tab %}
    <button
        type="button"
        class="btn-desplegar-mobile btn-desplegar-mobile--hide is-active"
        data-panel-action="hide"
        aria-label="Ocultar panel"
    >
        <i data-lucide="chevron-right" class="tab-icon tab-icon-hide"></i>
    </button>
    {% endif %}

    <button
        type="button"
        class="btn-desplegar-mobile {% if not show_hide_tab %}is-active{% endif %}"
        data-target="#card-menu-{{ panel_id }}"
    >
        Menú
    </button>

    <button
        type="button"
        class="btn-desplegar-mobile"
        data-target="#card-grid-macros-{{ panel_id }}"
    >
        Macros
    </button>

    <button
        type="button"
        class="btn-desplegar-mobile"
        data-target="#card-grid-alloc-{{ panel_id }}"
    >
        Alloc
    </button>

    {% if show_mobile_edit_tab %}
    <button
        type="button"
        class="btn-desplegar-mobile"
        data-target="#card-grid-edit-mobile-{{ panel_id }}"
    >
        <i data-lucide="pencil" class="tab-icon-edit"></i>
    </button>
    {% endif %}
</div>
