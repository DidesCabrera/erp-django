<div class="theme-toggle-card">
    <div class="theme-toggle-copy">
      <div class="theme-toggle-title-row">
        <i data-lucide="palette" class="theme-toggle-title-icon"></i>
        <h3>Apariencia</h3>
      </div>
  
      <p>
        Cambia entre modo claro y modo oscuro. La preferencia se guarda en este navegador.
      </p>
    </div>
  
    <button
      type="button"
      class="theme-toggle-button js-theme-toggle"
      data-theme-toggle
      aria-label="Cambiar a modo oscuro"
      aria-pressed="false"
    >
      <span class="theme-toggle-button-icon" data-theme-toggle-icon>
        <i data-lucide="moon"></i>
      </span>
  
      <span class="theme-toggle-button-text" data-theme-toggle-label>
        Modo oscuro
      </span>
    </button>
  </div>
