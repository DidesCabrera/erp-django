<div class="card-detail-tabs card-detail-tabs--desktop block-desplegar-tabla block-card-desplegar">

    <div class="btn-desplegar is-active" data-target="#card-grid-foods-{{ panel_id }}">
        <p>Tabla Nutricional</p>
    </div>

    {% if show_desktop_edit_tab %}
    <div class="btn-desplegar" data-target="#card-grid-foods-edit-{{ panel_id }}">
        <p>Editar</p>
    </div>
    {% endif %}

</div>

<div class="card-detail-tabs-mobile">
    <button
        type="button"
        class="btn-desplegar-mobile is-active"
        data-target="#card-grid-qty-{{ panel_id }}"
    >
        Alimentos
    </button>

    <button
        type="button"
        class="btn-desplegar-mobile"
        data-target="#card-grid-macros-{{ panel_id }}"
    >
        Macros
    </button>

    <button
        type="button"
        class="btn-desplegar-mobile"
        data-target="#card-grid-alloc-{{ panel_id }}"
    >
        Alloc
    </button>

    {% if show_mobile_edit_tab %}
    <button
        type="button"
        class="btn-desplegar-mobile"
        data-target="#card-grid-edit-mobile-{{ panel_id }}"
    >
        Editar
    </button>
    {% endif %}
</div>
