{% extends "base.html" %}

{% block content %}
<h2>Eliminar producto</h2>

<p>¿Estás seguro de que deseas eliminar <strong>{{ producto.nombre }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
</form>

<a href="{% url 'lista_productos' %}">Cancelar</a>
{% endblock %}
