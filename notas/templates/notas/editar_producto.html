{% extends "base.html" %}

{% block content %}
<h2>Editar producto</h2>

<form method="POST">
    {% csrf_token %}

    <label>Nombre:</label><br>
    <input type="text" name="nombre" value="{{ producto.nombre }}"><br><br>

    <label>Precio:</label><br>
    <input type="number" name="precio" value="{{ producto.precio }}" step="0.01"><br><br>

    <button type="submit">Guardar cambios</button>
</form>

<a href="{% url 'lista_productos' %}">Volver</a>
{% endblock %}
