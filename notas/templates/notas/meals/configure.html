{% extends "notas/base.html" %}
{% block title %}
Configure Meal – {{ meal.name }}
{% endblock %}
{% block content %}


<div class="page page--detail page-modal">

    <div class="wrap-page-modal">
        <div class="label-entity label-entity--meal page-modal}}">
          Meal
        </div>
        <h2>Configura tu Comida</h2>
        <br>

        <form class="configure-form" method="post">
            {% csrf_token %}

            <!-- PUBLIC -------------------------------------->
            <p>
              <label>
                  <input
                  type="checkbox"
                  name="is_public"
                  {% if not caps.can_publish %}disabled{% endif %}
                  {% if meal.is_public %}checked{% endif %}
                  >
                  Compartir esta Comida en la lista de exploración
              </label>

              {% if not caps.can_publish %}
                  <br>
                  <small>🔒 Public meals are available for nutritionists only</small>
              {% endif %}
            </p>

            <!-- FORKABLE ------------------------------------>
            <p>
              <label>
                  <input
                  type="checkbox"
                  name="is_forkable"
                  {% if meal.is_forkable %}checked{% endif %}
                  >
                  Permitir que otros usuarios dupliquen tu Comida
              </label>
            </p>

            <!-- COPIABLE 
            <p>
              <label>
                  <input
                  type="checkbox"
                  name="is_copiable"
                  {% if not caps.can_copy %}disabled{% endif %}
                  {% if meal.is_copiable %}checked{% endif %}
                  >
                  Allow copies
              </label>

              {% if not caps.can_copy %}
                  <br>
                  <small>🔒 Copiable meals are available on higher plans</small>
              {% endif %}
            </p>
            ------------------------------------>




            <hr>
            <!-- ACTION NAVEGATION ======================================-->
            <div class="btn-block">
              <!-- 👈 Volver al paso 1 (seguro) -->
              <a>
                  <button  type="submit" class="btn-cancel-create">Volver</button>
              </a>
              <button type="submit" class="btn-continue">Finalizar</button>
            </div>
        </form>
    </div>
</div>


{% endblock %}
