<!DOCTYPE html>
<html>
<head>
    <title>Crear Nota</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            width: 300px;
        }
        input, textarea {
            margin-bottom: 10px;
            padding: 8px;
        }
        button {
            padding: 10px;
        }
    </style>
</head>
<body>
    
<h1>Editar nota</h1>

<form method="POST">
    {% csrf_token %}

    <label>Título:</label>
    <input type="text" name="titulo" value="{{ nota.titulo }}">
    <br>
    <label>Contenido:</label>
    <textarea name="contenido">{{ nota.contenido }}</textarea>
    <br>
    <button type="submit">Guardar cambios</button>
</form>

<a href="{% url 'lista_notas' %}">Volver</a>

</body>
</html>
