<div id="dpm-picker-section" class="section_picker is-collapsed">

    <div class="add-row">
      <div id="food-picker" class="selector">
        <i data-lucide="search" class="search-icon-add-row-icon"></i>
        <input
          type="text"
          id="food-search"
          placeholder="Escribe el alimento…"
          autocomplete="off"
        />
        <ul id="food-list" class="selector-list"></ul>
      </div>
    
      <button
        type="button"
        id="btn-cancel-picker-inline-dpm"
        class="btn-cancel-picker btn-cancel-picker-inline"
      >
        Cancelar
      </button>
    </div>
  
    <!-- PREVIEW + FORM -->
    <form
      method="post"
      action="{% url 'add_food_to_meal' main_id %}"
      id="form-preview"
      data-meal-id="{{ main_id }}"
      >
      {% csrf_token %}
  
      <!-- Hidden fields required by backend -->
      <input type="hidden" name="food_id" id="selected-food-id">
      <input type="hidden" name="quantity" id="selected-food-quantity">
      <input type="hidden" id="food-picker-mode" value="add">
      <input type="hidden" name="return_to" value="{{ request.path }}">
      <!-- Edit mode controls -->
      <input type="hidden" id="editing-mealfood-id">
      <input type="hidden" id="editing-original-quantity">


      <!-- FOOD PREVIEW =================================== -->
      <div id="food-preview" style="display:none;">

        <div class="picker-layout card">
      
          <!-- LEFT : FOOD INFO -->
          <div class="picker-section picker-food-info">
      
            {% include "components/card_picker_food.html" %}
            <!-- QUANTITY -->
            <div class="qty-preview">
              <label>
                Porción:
                <input
                  type="number"
                  id="food-quantity"
                  value="100"
                  min="0"
                  step="1"
                >
              </label>
            </div>
      
          </div>
      
      
          <!-- RIGHT : IMPACT -->
          <div class="picker-section picker-impact">
      
            <h3>Preview</h3>

            <div class="preview-picker">
      
              <table class="table-foods table-preview-picker dpm">
      
                <thead>
                  <tr>
      
                    <th>
                      <i data-lucide="box" class="add-row-icon"></i>
                    </th>
      
                    <th>
                      <i data-lucide="plus" class="add-row-icon"></i>
                      <i data-lucide="carrot" class="add-row-icon"></i>
                    </th>
      
                    <th>
                      <i data-lucide="equal" class="add-row-icon"></i>
                      <i data-lucide="utensils" class="add-row-icon"></i>
                    </th>
      
                    <th></th>
      
                    <th>
                      <i data-lucide="equal" class="add-row-icon"></i>
                      <i data-lucide="clipboard-list" class="add-row-icon"></i>
                    </th>
      
                    <th></th>
      
                  </tr>
                </thead>
      
      
                <tbody>
      
                  <!-- KCAL -->
                  <tr>
      
                    <td class="kcal-col">Kcal</td>
      
                    <td class="impact-positive">
                      +<span id="qty-kcal"></span>
                    </td>
      
                    <td>
                      <span id="meal-prev-kcal"></span>
                    </td>
      
                    <td></td>
      
                    <td>
                      <span id="dailyplan-prev-kcal"></span>
                    </td>
      
                    <td></td>
      
                  </tr>
      
      
                  <!-- PROTEIN -->
                  <tr>
      
                    <td class="grams-col">Protein</td>
      
                    <td class="impact-positive">
                      +<span id="qty-protein"></span>g
                    </td>
      
                    <td>
                      <span id="meal-prev-protein"></span>g
                    </td>
      
                    <td class="alloc-cell" id="meal-prev-alloc-protein-cell">
                      <div class="alloc-bar alloc-bar--protein"></div>
                      <span class="alloc-text" id="meal-prev-alloc-protein-text"></span>
                    </td>
      
                    <td>
                      <span id="dailyplan-prev-protein"></span>g
                    </td>
      
                    <td class="alloc-cell" id="dailyplan-prev-alloc-protein-cell">
                      <div class="alloc-bar alloc-bar--protein"></div>
                      <span class="alloc-text" id="dailyplan-prev-alloc-protein-text"></span>
                    </td>
      
                  </tr>
      
      
                  <!-- CARBS -->
                  <tr>
      
                    <td class="grams-col">Carbs</td>
      
                    <td class="impact-positive">
                      +<span id="qty-carbs"></span>g
                    </td>
      
                    <td>
                      <span id="meal-prev-carbs"></span>g
                    </td>
      
                    <td class="alloc-cell" id="meal-prev-alloc-carbs-cell">
                      <div class="alloc-bar alloc-bar--carbs"></div>
                      <span class="alloc-text" id="meal-prev-alloc-carbs-text"></span>
                    </td>
      
                    <td>
                      <span id="dailyplan-prev-carbs"></span>g
                    </td>
      
                    <td class="alloc-cell" id="dailyplan-prev-alloc-carbs-cell">
                      <div class="alloc-bar alloc-bar--carbs"></div>
                      <span class="alloc-text" id="dailyplan-prev-alloc-carbs-text"></span>
                    </td>
      
                  </tr>
      
      
                  <!-- FAT -->
                  <tr>
      
                    <td class="grams-col">Fat</td>
      
                    <td class="impact-positive">
                      +<span id="qty-fat"></span>g
                    </td>
      
                    <td>
                      <span id="meal-prev-fat"></span>g
                    </td>
      
                    <td class="alloc-cell" id="meal-prev-alloc-fat-cell">
                      <div class="alloc-bar alloc-bar--fat"></div>
                      <span class="alloc-text" id="meal-prev-alloc-fat-text"></span>
                    </td>
      
                    <td>
                      <span id="dailyplan-prev-fat"></span>g
                    </td>
      
                    <td class="alloc-cell" id="dailyplan-prev-alloc-fat-cell">
                      <div class="alloc-bar alloc-bar--fat"></div>
                      <span class="alloc-text" id="dailyplan-prev-alloc-fat-text"></span>
                    </td>
      
                  </tr>
      
                </tbody>
      
              </table>
      
            </div>
      
          </div>
      
        </div>

        <!-- BUTTONS -->
        <div class="actions-row">
          <button type="button" id="btn-cancel-edit" class="btn-cancel-picker">
              Cancelar
          </button>

          <button type="submit" id="btn-add-food" class="btn-add-picker">
              Agregar Alimento
          </button>
    
          <button type="submit" id="btn-update-food" style="display:none;" class="btn-update-picker">
              Guardar Cambios
          </button>
        </div>
        
      </div>
    
    </form>
  
  </div>
  

  <!-- JS DATA -->
  {% load static %}
  <script>
    window.FOOD_PICKER_FOODS = {{ foods_json|safe }};
    window.FOOD_PICKER_CONTEXT = {{ food_picker_json|safe }};
  </script>


  <script type="module" src="{% static 'notas/js/dpm_food_math.js' %}"></script>
  <script type="module" src="{% static 'notas/js/dpm_food_picker.js' %}"></script>
  <script type="module" src="{% static 'notas/js/dpm_food_preview.js' %}"></script>
