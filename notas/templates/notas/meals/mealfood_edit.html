{% extends "notas/base.html" %}

{% block content %}

<h2>Edit food in meal</h2>

<p>
  <strong>Meal:</strong> {{ meal.name }}<br>
  <strong>Food:</strong> {{ mf.food.name }}
</p>

<form method="post">
  {% csrf_token %}

  <label>
    Quantity (g):
    <input
      type="number"
      name="quantity"
      value="{{ mf.quantity|floatformat:0 }}"
      min="0"
      step="10"
    >
  </label>

  <br><br>

  <button type="submit">Save</button>
  <a href="{% url 'meal_detail' meal.id %}">Cancel</a>
</form>

{% endblock %}
