{% extends "notas/base.html" %}
{% block title %}Add Meal to Dailyplan{% endblock %}
{% block content %}

<div class="page page--detail page-modal">

  <div class="wrap-page-modal">

    <h2>Add "{{ meal.name }}" to daily plan</h2>

    <form method="post" action="{% url 'dailyplan_add_meal' 0 %}">
      {% csrf_token %}

      <input type="hidden" name="meal_id" value="{{ meal.id }}">

      <label class="name-create">Daily plan</label>
      <select name="dailyplan_id" required class="input-create">
        {% for dp in dailyplans %}
          <option value="{{ dp.id }}" >{{ dp.name }}</option>
        {% endfor %}
      </select>

      <label class="name-create">Hour</label>
      <input type="time" name="hour" class="input-create" step="300" value="08:00">
      
      <label class="name-create">Note</label>
      <input type="text" name="note" class="input-create">


      <hr>
      <div class="btn-block">
        <button  type="submit" class="btn-cancel-create">Cancelar</button>
        <button  type="submit" class="btn-continue">Agregar</button>
      </div>

    </form>

  </div>

</div>

{% endblock %}
