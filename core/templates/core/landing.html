<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Scoope</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 700px;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            font-size: 1.2rem;
            color: #cbd5e1;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .cta {
            display: inline-block;
            padding: 0.9rem 2rem;
            background: #22c55e;
            color: #0f172a;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s ease;
        }

        .cta:hover {
            background: #16a34a;
        }

        .secondary {
            display: block;
            margin-top: 1rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Diseña tu nutrición.</h1>
        <p>
            My Scoope te ayuda a crear comidas, medir lo importante
            y aprender a ajustar tus porciones con claridad.
            No es una app para depender. Es una herramienta para entender.
        </p>

        <a href="/accounts/login/" class="cta">
            Crear mi primera comida
        </a>

        <a href="/accounts/login/" class="secondary">
            Ya tengo cuenta
        </a>
    </div>
</body>
</html>
